<div class="p-6 space-y-6">

  <!-- Totalizadores de pedidos -->
  <div class="bg-white rounded-lg shadow p-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-xl font-semibold text-gray-800">Pedidos por Status</h2>
      <a routerLink="/orders" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">
        Ver todos os pedidos →
      </a>
    </div>

    <div class="grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-5">
      @for (status of allStatuses; track status) {
        <div class="rounded-lg border p-4 text-center" [ngClass]="statusColors[status]">
          @if (loadingSummary) {
            <div class="h-8 w-12 bg-current opacity-20 rounded mx-auto mb-2 animate-pulse"></div>
          } @else {
            <p class="text-2xl font-bold">{{ getCount(status) }}</p>
          }
          <p class="text-xs font-medium mt-1">{{ statusLabels[status] }}</p>
        </div>
      }
    </div>
  </div>

</div>
