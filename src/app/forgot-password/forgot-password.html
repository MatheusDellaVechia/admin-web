<div class="min-h-screen flex items-center justify-center bg-gray-100 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-lg">
    <div *ngIf="!successMessage">
      <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
        Recuperar senha
      </h2>

      <form class="mt-8 space-y-6" [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
        <!-- Step 1: Email -->
        <div *ngIf="step === 1" class="space-y-4">
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
            <input id="email" type="email" formControlName="email" class="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="seu@email.com" [class.border-red-500]="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched">
            <div *ngIf="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched" class="text-red-500 text-xs mt-1">
              <span *ngIf="forgotForm.get('email')?.errors?.['required']">E-mail é obrigatório.</span>
              <span *ngIf="forgotForm.get('email')?.errors?.['email']">E-mail inválido.</span>
            </div>
          </div>

          <button type="button" (click)="sendCode()" class="w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            Enviar código
          </button>
        </div>

        <!-- Step 2: Code and New Password -->
        <div *ngIf="step === 2" class="space-y-4">
          <div>
            <label for="code" class="block text-sm font-medium text-gray-700 mb-1">Código de verificação</label>
            <input id="code" type="text" formControlName="code" class="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="Digite o código recebido">
            
            <div class="mt-2 text-sm text-gray-600">
              <span *ngIf="!canResend">
                Não recebeu o código? Envie novamente em <span class="font-bold">{{ timerSeconds }}s</span>
              </span>
              <button *ngIf="canResend" type="button" (click)="resendCode()" class="text-indigo-600 hover:text-indigo-500 font-medium">
                Enviar novamente
              </button>
            </div>
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Nova senha</label>
            <input id="password" type="password" formControlName="password" class="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="********">
          </div>

          <div>
            <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Confirmar nova senha</label>
            <input id="confirmPassword" type="password" formControlName="confirmPassword" class="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="********">
            <div *ngIf="forgotForm.get('confirmPassword')?.touched && forgotForm.hasError('mismatch')" class="text-red-500 text-xs mt-1">
              As senhas não coincidem.
            </div>
          </div>

          <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            Redefinir senha
          </button>
        </div>
      </form>
    </div>

    <!-- Success Message -->
    <div *ngIf="successMessage" class="text-center py-8">
      <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-4">
        <svg class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <h2 class="text-2xl font-bold text-gray-900">Senha alterada com sucesso!</h2>
      <p class="text-gray-600 mt-2">Redirecionando para o login...</p>
    </div>

    <div class="mt-6 text-center">
      <a routerLink="/login" class="font-medium text-indigo-600 hover:text-indigo-500 text-sm">
        Voltar para o login
      </a>
    </div>
  </div>
</div>
